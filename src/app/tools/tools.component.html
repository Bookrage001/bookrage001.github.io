<section class="tools-shell">
	<mat-card class="fuel-card">
		<h1>Fuel Price Tracker</h1>
		<p class="intro">Track annual fuel price trends and visualize year-to-year movement.</p>

		<div class="controls-row">
			<label>
				Year Range
				<input #yearInput type="text" placeholder="2025-26">
			</label>

			<label>
				Price
				<input #priceInput type="number" step="0.1" min="0" placeholder="170.2">
			</label>

			<button mat-raised-button color="primary" type="button" (click)="addFuelPrice(yearInput, priceInput)">
				Add Price
			</button>
		</div>

		<div class="stats-row">
			<p><strong>Entries:</strong> {{ fuelPriceEntries.length }}</p>
			<p><strong>Average:</strong> ${{ averageFuelPrice | number: '1.3-3' }}</p>
		</div>

		<app-line-graph
			[chartTitle]="'Fuel Price Trend (2004-05 to 2024-25)'"
			[seriesName]="'Annual fuel price'"
			[xAxisLabels]="fuelPriceLabels"
			[seriesData]="fuelPriceValues"
			[trendSeriesName]="'Historical trend (excluding latest year)'"
			[trendSeriesData]="historicalTrendValues"
			[highlightStartLabel]="'2020-21'"
			[highlightEndLabel]="'2022-23'"
			[highlightLabel]="'COVID period'"
		></app-line-graph>

		<div class="actions-row">
			<button mat-stroked-button color="primary" type="button" (click)="removeLatestPrice()" [disabled]="!fuelPriceEntries.length">
				Remove Latest
			</button>
			<button mat-stroked-button color="warn" type="button" (click)="resetFuelPriceData()" [disabled]="!fuelPriceEntries.length">
				Clear Data
			</button>
		</div>
	</mat-card>
</section>
