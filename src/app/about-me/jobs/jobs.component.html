<div>
  <hr />

  <div class="title-row">
    <h1>Professional Experience</h1>
    <button mat-stroked-button type="button" (click)="toggleFilters()">
      {{ filtersVisible ? 'Hide Filters' : 'Show Filters' }}
    </button>
  </div>

  <div class="filter-panel" *ngIf="filtersVisible">
    <div class="filter-header">
      <span>Filters</span>
      <button mat-stroked-button type="button" (click)="clearAllFilters()" [disabled]="selectedTags.length === 0 && selectedTechTags.length === 0">Clear All</button>
    </div>

    <div class="filter-row">
      <div class="filter-header">
        <span>Filter by skill:</span>
        <button mat-stroked-button type="button" (click)="clearTagFilter()" [disabled]="selectedTags.length === 0">Clear</button>
      </div>
      <span class="filter-state" *ngIf="selectedTags.length === 0">All skills</span>
      <mat-chip-listbox class="filter-chips" [multiple]="true">
        <mat-chip-option
          class="filter-chip"
          *ngFor="let tag of tags$ | async"
          [selected]="isTagSelected(tag)"
          (click)="onTagChange(tag)"
        >
          {{tag}}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>

    <div class="filter-row">
      <div class="filter-header">
        <span>Filter by tech:</span>
        <button mat-stroked-button type="button" (click)="clearTechTagFilter()" [disabled]="selectedTechTags.length === 0">Clear</button>
      </div>
      <span class="filter-state" *ngIf="selectedTechTags.length === 0">All tech</span>
      <mat-chip-listbox class="filter-chips" [multiple]="true">
        <mat-chip-option
          class="filter-chip"
          *ngFor="let tag of techTags$ | async"
          [selected]="isTechTagSelected(tag)"
          (click)="onTechTagChange(tag)"
        >
          {{tag}}
        </mat-chip-option>
      </mat-chip-listbox>
    </div>
  </div>

  <div *ngFor="let job of jobs$ | async">
    <div>
      <b>{{job.data.role}}</b> <br />

      {{job.data.company}}: {{job.data.startDate | date:'MMM y'}} - {{job.data.endDate ? (job.data.endDate | date:'MMM y') : 'Present'}}

      <div class="tag-list">
        <span class="tag-chip" *ngFor="let tag of job.data.tags">{{tag}}</span>
      </div>

      <div class="tech-tag-block" *ngIf="job.data.techTags?.length">
        <span class="tech-tag-label">Tech:</span>
        <div class="tag-list tech-tag-list">
          <span class="tag-chip tech-tag-chip" *ngFor="let techTag of job.data.techTags">{{techTag}}</span>
        </div>
      </div>

      <ul>
        <li *ngFor="let description of job.data.description">{{description}}</li>
      </ul>

    </div>
  </div>
</div>
