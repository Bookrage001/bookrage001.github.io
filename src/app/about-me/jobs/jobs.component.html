<div>
  <hr />

  <h1>Professional Experience</h1>

  <div *ngFor="let job of jobs$ | async">
    <div>
      <b>{{job.role}}</b> <br />

      {{job.company}}: {{job.startMonth}} {{job.startYear}} - {{job.endMonth}} {{job.endYear}}

      <p>{{job.description}}</p>
      <!-- <mat-divider></mat-divider> -->
    </div>
  </div>
</div>
